{% extends "base.html" %}
{% block title %}Register – HouseIQ{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
  <div class="w-full max-w-md">
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-2xl">
      <h1 class="text-3xl font-bold text-center mb-2">Create account</h1>
      <p class="text-center text-gray-400 mb-8 text-sm">Start predicting house prices today</p>
      <form method="POST" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Full Name</label>
          <input name="full_name" type="text"
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5
                        text-gray-100 placeholder-gray-500 focus:outline-none
                        focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                 placeholder="Jane Doe"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Username</label>
          <input name="username" type="text" required
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5
                        text-gray-100 placeholder-gray-500 focus:outline-none
                        focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                 placeholder="jane_doe"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
          <input name="email" type="email" required
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5
                        text-gray-100 placeholder-gray-500 focus:outline-none
                        focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                 placeholder="jane@example.com"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
          <input name="password" type="password" required minlength="6"
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5
                        text-gray-100 placeholder-gray-500 focus:outline-none
                        focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                 placeholder="Min. 6 characters"/>
        </div>
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold
                       py-2.5 rounded-lg transition">
          Create Account
        </button>
      </form>
      <p class="text-center text-sm text-gray-400 mt-6">
        Already have an account?
        <a href="/login" class="text-indigo-400 hover:underline">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
