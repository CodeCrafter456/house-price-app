{% extends "base.html" %}
{% block title %}Login – HouseIQ{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
  <div class="w-full max-w-md">
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-2xl">
      <h1 class="text-3xl font-bold text-center mb-2">Welcome back</h1>
      <p class="text-center text-gray-400 mb-8 text-sm">Sign in to your HouseIQ account</p>
      <form method="POST" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Username</label>
          <input name="username" type="text" required
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5
                        text-gray-100 placeholder-gray-500 focus:outline-none
                        focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                 placeholder="your_username"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
          <input name="password" type="password" required
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5
                        text-gray-100 placeholder-gray-500 focus:outline-none
                        focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                 placeholder="••••••••"/>
        </div>
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold
                       py-2.5 rounded-lg transition">
          Sign In
        </button>
      </form>
      <p class="text-center text-sm text-gray-400 mt-6">
         Don't have an account?
        <a href="/register" class="text-indigo-400 hover:underline">Register here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
